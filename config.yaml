pipeline:
  raw_scans_folder: "/Volumes/Public/-ScansImprimante"
  searchable_pdf_folder: "/Volumes/Administratif/00-ScansNonTries"
  destination_base_folder: "/Volumes/Administratif"
  person_categories_path: "person_categories.yaml"
  rename_prefix: "SCN"

  polling:
    enabled: true
    interval_minutes: 15

  ocr:
    engine: "tesseract"
    languages: ["fra", "eng"]
    dpi: 300
    confidence_threshold: 0.7
    output_format: "searchable_pdf"

  ai:
    engine: "ollama"
    model: "qwen2.5:7b"
    temperature: 0.1
    max_tokens: 500
    confidence_threshold: 0.7

  routing:
    enable_subfolder_detection: true
    subfolder_confidence_threshold: 0.5

  duplicate_detection:
    method: "sha256"
    processed_index: "sqlite"

  web_ui:
    host: "127.0.0.1"
    port: 8080
    enabled: true

  logging:
    level: "INFO"
    file: "logs/pipeline.log"
    max_size_mb: 10
    backup_count: 5